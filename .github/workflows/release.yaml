name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.pr || steps.release.outputs.release_created }}
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        if: ${{ steps.release.outputs.pr || steps.release.outputs.release_created }}

      # release-please bumps the version in pyproject.toml but not uv.lock, so
      # `uv sync --locked` (ci.yaml) fails on main once the release PR merges.
      # Regenerate the lock on the release branch so it merges already in sync.
      - name: Sync uv.lock on the release PR
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          branch="$(gh pr list --state open --json headRefName \
            --jq '[.[] | select(.headRefName | startswith("release-please--"))][0].headRefName')"
          if [ -z "$branch" ] || [ "$branch" = "null" ]; then
            echo "No release-please branch found; nothing to sync." && exit 0
          fi
          git fetch origin "$branch"
          git checkout "$branch"
          uv lock
          if git diff --quiet uv.lock; then
            echo "uv.lock already in sync."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add uv.lock
            git commit -m "chore: sync uv.lock to release version"
            git push origin "HEAD:$branch"
          fi

      - name: Build and publish
        if: ${{ steps.release.outputs.release_created }}
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv build && uv publish
